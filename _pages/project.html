{% include base_path %}

<style>
  .project-filter-buttons {
    display: flex;
    gap: 1em;
    margin-bottom: 2em;
    flex-wrap: wrap;
  }
  
  .project-filter-btn {
    padding: 0.6em 1.5em;
    font-size: 1.1em;
    font-weight: bold;
    border: 2px solid #333;
    background-color: white;
    color: #333;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  
  .project-filter-btn:hover {
    background-color: #f0f0f0;
  }
  
  .project-filter-btn.active {
    background-color: #333;
    color: white;
  }
  
  .portfolio-item {
    transition: opacity 0.3s ease, display 0.3s ease;
  }
  
  .portfolio-item.hidden {
    display: none;
  }
</style>

<div class="project-filter-buttons">
  <button id="btn-tapeout" class="project-filter-btn active" data-filter="tapeout">Tape-out</button>
  <button id="btn-simulation" class="project-filter-btn" data-filter="simulation">Simulation</button>
</div>

<div id="portfolio-container">
{% for post in site.portfolio %}
  {% include archive-single-portfolio.html %}
{% endfor %}
</div>

<script>
(function() {
  'use strict';
  
  function filterProjects(filter) {
    console.log('Filtering by:', filter); // 디버깅용
    
    var items = document.querySelectorAll('.portfolio-item');
    var buttons = document.querySelectorAll('.project-filter-btn');
    var i;
    
    // Update button states
    for (i = 0; i < buttons.length; i++) {
      if (buttons[i].getAttribute('data-filter') === filter) {
        buttons[i].classList.add('active');
      } else {
        buttons[i].classList.remove('active');
      }
    }
    
    // Filter items
    for (i = 0; i < items.length; i++) {
      var category = items[i].getAttribute('data-category') || 'tapeout';
      if (category === filter) {
        items[i].classList.remove('hidden');
      } else {
        items[i].classList.add('hidden');
      }
    }
  }
  
  function setupFilters() {
    var btnTapeout = document.getElementById('btn-tapeout');
    var btnSimulation = document.getElementById('btn-simulation');
    
    if (!btnTapeout || !btnSimulation) {
      setTimeout(setupFilters, 100);
      return;
    }
    
    // Add click handlers directly to buttons
    btnTapeout.onclick = function() {
      filterProjects('tapeout');
      return false;
    };
    
    btnSimulation.onclick = function() {
      filterProjects('simulation');
      return false;
    };
    
    // Set initial filter to tapeout
    filterProjects('tapeout');
  }
  
  // Wait for DOM to be ready
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(setupFilters, 1);
  } else {
    document.addEventListener('DOMContentLoaded', setupFilters);
    window.addEventListener('load', setupFilters);
  }
})();
</script>
