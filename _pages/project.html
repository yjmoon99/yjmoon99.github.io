{% include base_path %}

<style>
  .project-filter-buttons {
    display: flex;
    gap: 1em;
    margin-bottom: 2em;
    flex-wrap: wrap;
  }
  
  .project-filter-btn {
    padding: 0.6em 1.5em;
    font-size: 1.1em;
    font-weight: bold;
    border: 2px solid #333;
    background-color: white;
    color: #333;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  
  .project-filter-btn:hover {
    background-color: #f0f0f0;
  }
  
  .project-filter-btn.active {
    background-color: #333;
    color: white;
  }
  
  .portfolio-item {
    transition: opacity 0.3s ease, display 0.3s ease;
  }
  
  .portfolio-item.hidden {
    display: none !important;
  }
  
  /* 초기 상태: simulation 항목 숨기기 */
  .portfolio-item[data-category="simulation"] {
    display: none;
  }
</style>

<div class="project-filter-buttons">
  <button id="btn-tapeout" class="project-filter-btn active" data-filter="tapeout">Tape-out</button>
  <button id="btn-simulation" class="project-filter-btn" data-filter="simulation">Simulation</button>
</div>

<div id="portfolio-container">
{% for post in site.portfolio %}
  {% include archive-single-portfolio.html %}
{% endfor %}
</div>

<script>
(function() {
  'use strict';
  
  function filterProjects(filter) {
    var items = document.querySelectorAll('.portfolio-item');
    var buttons = document.querySelectorAll('.project-filter-btn');
    var i, item, category;
    
    // Update button states
    for (i = 0; i < buttons.length; i++) {
      if (buttons[i].getAttribute('data-filter') === filter) {
        buttons[i].classList.add('active');
      } else {
        buttons[i].classList.remove('active');
      }
    }
    
    // Filter items
    for (i = 0; i < items.length; i++) {
      item = items[i];
      category = item.getAttribute('data-category');
      
      if (!category) {
        category = 'tapeout';
      }
      
      if (category === filter) {
        item.classList.remove('hidden');
        item.style.display = '';
      } else {
        item.classList.add('hidden');
        item.style.display = 'none';
      }
    }
  }
  
  function initProjectFilter() {
    var btnTapeout = document.getElementById('btn-tapeout');
    var btnSimulation = document.getElementById('btn-simulation');
    
    if (!btnTapeout || !btnSimulation) {
      setTimeout(initProjectFilter, 50);
      return;
    }
    
    // Remove any existing listeners by cloning
    var newBtnTapeout = btnTapeout.cloneNode(true);
    var newBtnSimulation = btnSimulation.cloneNode(true);
    btnTapeout.parentNode.replaceChild(newBtnTapeout, btnTapeout);
    btnSimulation.parentNode.replaceChild(newBtnSimulation, btnSimulation);
    
    // Add click handlers
    newBtnTapeout.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      filterProjects('tapeout');
      return false;
    });
    
    newBtnSimulation.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      filterProjects('simulation');
      return false;
    });
    
    // Set initial filter to tapeout
    filterProjects('tapeout');
  }
  
  // Multiple initialization attempts
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initProjectFilter);
  } else {
    initProjectFilter();
  }
  
  window.addEventListener('load', function() {
    setTimeout(initProjectFilter, 100);
  });
})();
</script>
