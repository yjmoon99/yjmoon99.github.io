layout: archive
title: "Project"
permalink: /projects/
author_profile: true
---

{% include base_path %}

<style>
  .project-filter-buttons {
    display: flex;
    gap: 1em;
    margin-bottom: 2em;
    flex-wrap: wrap;
  }
  
  .project-filter-btn {
    padding: 0.6em 1.5em;
    font-size: 1.1em;
    font-weight: bold;
    border: 2px solid #333;
    background-color: white;
    color: #333;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  
  .project-filter-btn:hover {
    background-color: #f0f0f0;
  }
  
  .project-filter-btn.active {
    background-color: #333;
    color: white;
  }
  
  .portfolio-item {
    transition: opacity 0.3s ease, display 0.3s ease;
  }
  
  .portfolio-item.hidden {
    display: none !important;
  }
  
  /* 초기 상태: simulation 항목 숨기기 */
  .portfolio-item[data-category="simulation"] {
    display: none !important;
  }
  
  /* 필터링된 항목 표시 */
  .portfolio-item.show-item {
    display: block !important;
  }
  
  /* 숨겨진 항목의 이미지 로딩 방지 */
  .portfolio-item.hidden img {
    content: none;
  }
  
  /* 이미지 lazy loading */
  .portfolio-item img {
    loading: lazy;
  }
  
  /* 초기 렌더링 최적화 */
  #portfolio-container {
    contain: layout style paint;
  }
</style>

<div class="project-filter-buttons">
  <button id="btn-tapeout" class="project-filter-btn active" data-filter="tapeout" onclick="window.filterProjects('tapeout'); return false;">Tape-out</button>
  <button id="btn-simulation" class="project-filter-btn" data-filter="simulation" onclick="window.filterProjects('simulation'); return false;">Simulation</button>
</div>

<div id="portfolio-container">
{% for post in site.portfolio %}
  {% include archive-single-portfolio.html %}
{% endfor %}
</div>

<script src="{{ base_path }}/assets/js/project-filter.js" defer></script>
