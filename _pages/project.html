{% include base_path %}

<style>
  .project-filter-buttons {
    display: flex;
    gap: 1em;
    margin-bottom: 2em;
    flex-wrap: wrap;
  }
  
  .project-filter-btn {
    padding: 0.6em 1.5em;
    font-size: 1.1em;
    font-weight: bold;
    border: 2px solid #333;
    background-color: white;
    color: #333;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  
  .project-filter-btn:hover {
    background-color: #f0f0f0;
  }
  
  .project-filter-btn.active {
    background-color: #333;
    color: white;
  }
  
  .portfolio-item {
    transition: opacity 0.3s ease, display 0.3s ease;
  }
  
  .portfolio-item.hidden {
    display: none;
  }
</style>

<div class="project-filter-buttons">
  <button class="project-filter-btn active" data-filter="tapeout">Tapeout</button>
  <button class="project-filter-btn" data-filter="simulation">Simulation</button>
  <button class="project-filter-btn" data-filter="all">All</button>
</div>

<div id="portfolio-container">
{% for post in site.portfolio %}
  {% include archive-single-portfolio.html %}
{% endfor %}
</div>

<script>
// Filter function
function filterProjects(filter) {
  const items = document.querySelectorAll('.portfolio-item');
  const buttons = document.querySelectorAll('.project-filter-btn');
  
  // Update button states
  buttons.forEach(btn => {
    if (btn.getAttribute('data-filter') === filter) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  
  // Filter items
  items.forEach(item => {
    const category = item.getAttribute('data-category') || 'tapeout';
    
    if (filter === 'all') {
      item.classList.remove('hidden');
    } else if (category === filter) {
      item.classList.remove('hidden');
    } else {
      item.classList.add('hidden');
    }
  });
}

// Initialize when DOM is ready
(function() {
  function initFilter() {
    const buttons = document.querySelectorAll('.project-filter-btn');
    
    if (buttons.length === 0) {
      setTimeout(initFilter, 50);
      return;
    }
    
    // Add click handlers using event delegation
    const buttonContainer = document.querySelector('.project-filter-buttons');
    if (buttonContainer) {
      buttonContainer.addEventListener('click', function(e) {
        if (e.target && e.target.classList.contains('project-filter-btn')) {
          const filter = e.target.getAttribute('data-filter');
          if (filter) {
            filterProjects(filter);
          }
        }
      });
    }
    
    // Set initial filter to tapeout
    filterProjects('tapeout');
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initFilter);
  } else {
    initFilter();
  }
})();
</script>
